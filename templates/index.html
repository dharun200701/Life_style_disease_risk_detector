<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep Disorder Predictor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>Sleep Disorder Predictor</h2>

<form id="prediction-form">

<label>Age</label>
<input type="number" name="Age" placeholder="Enter your age">

<label>Gender</label>
<select name="Gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<label>Occupation</label>
<select name="Occupation">
<option>Student</option>
<option>Engineer</option>
<option>Doctor</option>
<option>Teacher</option>
<option>Manager</option>
<option>Other</option>
</select>

<label>Sleep Duration (hours per night)</label>
<input type="number" step="0.1" name="Sleep Duration" placeholder="Example: 7">

<label>Physical Activity Level (minutes per day)</label>
<input type="number" name="Physical Activity Level" placeholder="Example: 30">

<label>BMI Category</label>
<select name="BMI Category">
<option>Underweight</option>
<option>Normal</option>
<option>Overweight</option>
<option>Obese</option>
</select>

<label>Systolic Blood Pressure</label>
<input type="number" name="Systolic" placeholder="Example: 120">

<label>Diastolic Blood Pressure</label>
<input type="number" name="Diastolic" placeholder="Example: 80">

<button type="submit">Predict</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("prediction-form").addEventListener("submit",async function(e){

e.preventDefault();

const formData = new FormData(this);
const data = {};

formData.forEach((value,key)=>data[key]=value);

const response = await fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result = await response.json();

document.getElementById("result").innerHTML =
"Prediction Result: " + result.prediction;

});

</script>

</body>

</html>
