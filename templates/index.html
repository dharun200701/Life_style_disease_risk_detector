<!DOCTYPE html>
<html>
<head>
<title>Sleep Predictor</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background: linear-gradient(135deg,#ffffff,#f0f4ff);
    padding:30px;
    width:420px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    border:2px solid #667eea;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button:hover{
    background:#5a67d8;
}
</style>
</head>

<body>

<div class="container">

<h2>Sleep Disorder Predictor</h2>

<form action="/predict" method="POST">

<input type="number" name="Age" placeholder="Age" required>

<select name="Gender">
<option>Male</option>
<option>Female</option>
</select>

<input type="number" step="0.1" name="Sleep Duration" placeholder="Sleep Duration">

<input type="number" name="Physical Activity Level" placeholder="Activity Level">

<select name="BMI Category">
<option>Normal</option>
<option>Overweight</option>
<option>Obese</option>
</select>

<input type="number" name="Systolic" placeholder="Systolic BP">
<input type="number" name="Diastolic" placeholder="Diastolic BP">

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
